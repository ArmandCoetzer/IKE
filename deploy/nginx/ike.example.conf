# Example nginx TLS reverse proxy for IKE field-service stack.
# Update certificate paths if your certbot/live directory names differ.

server {
    listen 80;
    server_name ike.accent-dev.co.za ikeapi.accent-dev.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ike.accent-dev.co.za;

    ssl_certificate /etc/letsencrypt/live/ike.accent-dev.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ike.accent-dev.co.za/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name ikeapi.accent-dev.co.za;

    ssl_certificate /etc/letsencrypt/live/ikeapi.accent-dev.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ikeapi.accent-dev.co.za/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
