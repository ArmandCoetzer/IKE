server {
    listen 80;
    listen [::]:80;
    server_name dvcp.accent-dev.co.za dvcpapi.accent-dev.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dvcp.accent-dev.co.za;

    # Set these to your certificate paths (Let's Encrypt recommended).
    ssl_certificate /etc/letsencrypt/live/dvcp.accent-dev.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dvcp.accent-dev.co.za/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dvcpapi.accent-dev.co.za;

    # Set these to your certificate paths (Let's Encrypt recommended).
    ssl_certificate /etc/letsencrypt/live/dvcpapi.accent-dev.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dvcpapi.accent-dev.co.za/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
