<div class="container-fluid">
  <app-page-header
    [title]="module?.title ?? 'Module'"
    [backLink]="module && module.courseId ? ['/training', 'course', module.courseId] : '/training'"
    backLabel="← Back to course" />
  @if (loading) {
    <p>Loading...</p>
  } @else if (error) {
    <p class="text-danger">{{ error }}</p>
  } @else if (module) {
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        @if (module.videoUrl) {
          @if (isEmbeddedVideo(module.videoUrl)) {
            <div class="ratio ratio-16x9 mb-3">
              <iframe [src]="safeVideoUrl(module.videoUrl)!" title="Video" allowfullscreen></iframe>
            </div>
          } @else {
            <div class="ratio ratio-16x9 mb-3">
              <video controls [src]="safeVideoUrl(module.videoUrl)!" class="w-100 h-100">
                Your browser does not support the video tag.
              </video>
            </div>
          }
        }
        @if (module.contentHtml) {
          <div class="module-content" [innerHTML]="safeContent(module.contentHtml)"></div>
        }
      </div>
    </div>
    <div class="d-flex flex-wrap gap-2">
      @if (module.isCompleted !== true) {
        <button type="button" class="btn btn-primary" (click)="markComplete()" [disabled]="markingComplete">
          {{ markingComplete ? 'Saving…' : 'Mark as complete' }}
        </button>
      } @else {
        <span class="badge bg-success align-self-center">Completed</span>
      }
      @if (module.quizId) {
        <a class="btn btn-sm btn-outline-primary" [routerLink]="['/training', 'quiz', module.quizId]">Take quiz</a>
      }
    </div>
  }
</div>
