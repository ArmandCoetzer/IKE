<div class="container-fluid">
  <app-page-header title="Employees">
    <a routerLink="/users/new" class="btn btn-primary">Add employee</a>
  </app-page-header>
  <div class="tradion-list-toolbar">
    <select class="form-select form-select-sm tradion-filter-select" [ngModel]="filterRole" (ngModelChange)="filterRole = $event; onFilterChange()">
      <option [ngValue]="null">All</option>
      @for (r of roles; track r) {
        <option [ngValue]="r">{{ r }}</option>
      }
    </select>
    <select class="form-select form-select-sm tradion-filter-select" [ngModel]="filterStatus" (ngModelChange)="filterStatus = $event; onFilterChange()">
      <option value="all">All</option>
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
    </select>
    <input type="text" class="form-control form-control-sm tradion-filter-search" placeholder="Name or email..." [(ngModel)]="searchText" (ngModelChange)="page = 1" (keyup.enter)="onSearch()" />
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onSearch()">Search</button>
    <span class="text-muted ms-2">{{ filtered.length }} employee{{ filtered.length === 1 ? '' : 's' }}</span>
  </div>
  <div class="d-flex gap-2 mb-2">
    <button type="button" class="btn btn-outline-secondary btn-sm" [disabled]="!someSelected || batchInProgress" (click)="batchSetActive(true)">Set active</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" [disabled]="!someSelected || batchInProgress" (click)="batchSetActive(false)">Set inactive</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="exportCsv()">Export CSV</button>
  </div>
  @if (loading) {
    <p>Loading...</p>
  } @else {
    <app-table>
        <thead>
          <tr>
            <th><input type="checkbox" [checked]="allSelected" (change)="toggleSelectAll($any($event.target).checked)" /></th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          @for (u of pagedFiltered; track u.id) {
            <tr>
              <td><input type="checkbox" [checked]="isSelected(u.id)" (change)="toggleSelect(u.id, $any($event.target).checked)" /></td>
              <td><span class="fw-semibold">{{ u.fullName || u.email }}</span></td>
              <td>{{ u.email }}</td>
              <td><span class="badge bg-secondary">{{ u.role || '—' }}</span></td>
              <td><span class="badge" [class.bg-success]="u.isActive" [class.bg-secondary]="!u.isActive">{{ u.isActive ? 'Active' : 'Inactive' }}</span></td>
              <td><a class="btn btn-sm btn-outline-primary" [routerLink]="['/users', u.id]">Edit</a></td>
            </tr>
          }
        </tbody>
      </app-table>
    <app-table-pagination [totalCount]="filtered.length" [page]="page" [pageSize]="pageSize" (pageChange)="page = $event" />
  }
</div>
