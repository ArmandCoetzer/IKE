<div class="container-fluid">
  <app-page-header title="Add job card" backLink="/job-cards" />
  @if (loading) {
    <p>Loading...</p>
  } @else {
    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-body p-4">
        @if (error) {
          <div class="alert alert-danger">{{ error }}</div>
        }
        <form (ngSubmit)="save()">
          <div class="mb-3">
            <label class="form-label">Service request (optional – use "None" to create from Quote/PO only)</label>
            <select class="form-select" [(ngModel)]="serviceRequestId" name="serviceRequestId" (ngModelChange)="onRequestSelect()">
              <option [ngValue]="null">— None (create from Quote/PO) —</option>
              @for (r of requests; track r.id) {
                <option [ngValue]="r.id">{{ r.requestNumber }} – {{ r.siteName }} – {{ r.description }}</option>
              }
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Site</label>
            <select class="form-select" [(ngModel)]="siteId" name="siteId" required [disabled]="!!serviceRequestId">
              <option [ngValue]="null">— Select site —</option>
              @for (s of sites; track s.id) {
                <option [ngValue]="s.id">{{ s.name }} {{ s.address ? ' – ' + s.address : '' }}</option>
              }
            </select>
            @if (serviceRequestId) {
              <p class="text-muted small mt-1 mb-0">Site is set from the selected request.</p>
            }
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="submitting">Save</button>
            <a routerLink="/job-cards" class="btn btn-light border">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  }
</div>
