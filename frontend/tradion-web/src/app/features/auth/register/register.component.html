<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-4">
      <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body auth-card-body">
          <img src="/logo/tradion-full.png" alt="Tradion" class="auth-brand-logo" />
          <h2 class="card-title mb-4">Create an account</h2>
          @if (error) {
            <div class="alert alert-danger" role="alert">{{ error }}</div>
          }
          <form (ngSubmit)="submit()">
            <h6 class="text-muted mb-2">Your account</h6>
            <div class="row g-3">
              <div class="col-12">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" [(ngModel)]="email" name="email" required email placeholder="e.g. name&#64;company.com" />
              </div>
              <div class="col-md-6">
                <label for="fullName" class="form-label">Full name (optional)</label>
                <input type="text" id="fullName" class="form-control" [(ngModel)]="fullName" name="fullName" placeholder="e.g. John Smith" />
              </div>
              <div class="col-md-6">
                <label for="password" class="form-label">Password</label>
                <div class="position-relative">
                  <input [type]="showPassword ? 'text' : 'password'" id="password" class="form-control pe-5" [(ngModel)]="password" name="password" required minlength="8" placeholder="At least 8 characters" />
                  <button type="button" class="password-visibility-toggle" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'" [attr.title]="showPassword ? 'Hide password' : 'Show password'">
                    @if (showPassword) {
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                        <path d="M13.359 11.238 15 12.879l-.707.707-2.002-2.002a8.74 8.74 0 0 1-4.29 1.153C3 12.737.7 8 .7 8a13.1 13.1 0 0 1 3.066-3.686L1.12 1.668l.707-.707 13.536 13.535-.707.707-1.297-1.297zM6.254 4.84A3 3 0 0 1 11.16 9.746l-.824-.824a2 2 0 0 0-2.512-2.512z"/>
                        <path d="M8 3.263c5 0 7.3 4.737 7.3 4.737a13.1 13.1 0 0 1-2.137 2.92l-.715-.715A12 12 0 0 0 14.161 8S12.147 4.263 8 4.263c-.847 0-1.612.156-2.297.39l-.786-.787A7.9 7.9 0 0 1 8 3.263"/>
                      </svg>
                    } @else {
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                      </svg>
                    }
                  </button>
                </div>
                <div class="form-text">Minimum 8 characters, including uppercase, lowercase, and a digit.</div>
              </div>
            </div>
            <h6 class="text-muted mb-2 mt-3">Company</h6>
            <div class="row g-3 mb-3">
              <div class="col-12">
                <label for="companyName" class="form-label">Company name</label>
                <input type="text" id="companyName" class="form-control" [(ngModel)]="companyName" name="companyName" required placeholder="e.g. Acme Ltd" />
              </div>
              <div class="col-md-6">
                <label for="companyAddress" class="form-label">Address (optional)</label>
                <input type="text" id="companyAddress" class="form-control" [(ngModel)]="companyAddress" name="companyAddress" placeholder="e.g. 123 Main St" />
              </div>
              <div class="col-md-6">
                <label for="companyPhone" class="form-label">Phone (optional)</label>
                <input type="text" id="companyPhone" class="form-control" [(ngModel)]="companyPhone" name="companyPhone" placeholder="e.g. +27 11 123 4567" />
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
              {{ loading ? 'Creating...' : 'Create account' }}
            </button>
          </form>
          <p class="mt-4 mb-0 text-center text-muted">
            Already have an account? <a routerLink="/login" class="fw-medium">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
