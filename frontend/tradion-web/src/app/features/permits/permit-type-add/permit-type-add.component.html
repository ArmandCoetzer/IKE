<div class="container-fluid">
  <app-page-header title="Add permit type" backBehavior="emit" (back)="goBack()" />
  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-body p-4">
      @if (error) {
        <div class="alert alert-danger">{{ error }}</div>
      }
      <form (ngSubmit)="save()">
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label text-body">Name</label>
            <input type="text" class="form-control" [(ngModel)]="name" name="name" required />
          </div>
          <div class="col-md-6">
            <label class="form-label text-body">Description</label>
            <input type="text" class="form-control" [(ngModel)]="description" name="description" />
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="submitting">Save</button>
          <button type="button" class="btn btn-light border" (click)="goBack()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
