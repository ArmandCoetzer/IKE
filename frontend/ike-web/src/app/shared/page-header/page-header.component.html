<div class="ike-page-header">
  <div class="ike-page-header__main">
    @if (backBehavior === 'emit') {
      <button type="button" class="btn btn-light border btn-sm" (click)="onBackClick()">{{ backLabel }}</button>
    } @else if (backLink) {
      <a [routerLink]="backLink" class="btn btn-light border btn-sm">{{ backLabel }}</a>
    }
    <h1 class="ike-page-header__title mb-0 fw-bold">{{ title }}</h1>
  </div>
  <div class="ike-page-header__actions">
    <ng-content />
  </div>
</div>
