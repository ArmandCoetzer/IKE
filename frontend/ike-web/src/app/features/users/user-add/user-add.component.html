<div class="container-fluid">
  <app-page-header title="Add employee" backLink="/users"></app-page-header>
  @if (loading) {
    <p>Loading...</p>
  } @else {
    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-body p-4">
        @if (error) {
          <div class="alert alert-danger">{{ error }}</div>
        }
        <form (ngSubmit)="save()">
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label text-body">Email</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="e.g. name&#64;company.com" />
            </div>
            <div class="col-md-6">
              <label class="form-label text-body">Role</label>
              <select class="form-select" [(ngModel)]="role" name="role" required>
                @for (r of roles; track r) {
                  <option [value]="r">{{ r }}</option>
                }
              </select>
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label text-body">First name</label>
              <input type="text" class="form-control" [(ngModel)]="firstName" name="firstName" required placeholder="e.g. John" />
            </div>
            <div class="col-md-6">
              <label class="form-label text-body">Last name</label>
              <input type="text" class="form-control" [(ngModel)]="lastName" name="lastName" required placeholder="e.g. Smith" />
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label text-body">Phone</label>
              <input type="text" class="form-control" [(ngModel)]="phone" name="phone" placeholder="e.g. +27 12 345 6789" />
            </div>
            <div class="col-md-6">
              <label class="form-label text-body">Occupation</label>
              <input type="text" class="form-control" [(ngModel)]="occupation" name="occupation" placeholder="e.g. Electrician" />
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="submitting">Save</button>
            <a routerLink="/users" class="btn btn-light border">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  }
</div>
