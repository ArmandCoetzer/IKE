<div class="container-fluid py-3">
  <app-page-header title="My account" />

  @if (loading) {
    <p>Loading...</p>
  } @else {
    <div class="card border-0 shadow-sm rounded-3 mb-4">
      <div class="card-body p-4">
        <h2 class="h6 mb-3">Profile</h2>
        @if (profileMessage) {
          <div class="alert alert-success py-2">{{ profileMessage }}</div>
        }
        @if (profileError) {
          <div class="alert alert-danger py-2">{{ profileError }}</div>
        }
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="email" />
          </div>
          <div class="col-md-3">
            <label class="form-label">First name</label>
            <input class="form-control" [(ngModel)]="firstName" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Last name</label>
            <input class="form-control" [(ngModel)]="lastName" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Phone</label>
            <input class="form-control" [(ngModel)]="phone" />
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" [disabled]="savingProfile" (click)="saveProfile()">
            {{ savingProfile ? 'Saving...' : 'Save profile' }}
          </button>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-body p-4">
        <h2 class="h6 mb-3">Change password</h2>
        @if (passwordMessage) {
          <div class="alert alert-success py-2">{{ passwordMessage }}</div>
        }
        @if (passwordError) {
          <div class="alert alert-danger py-2">{{ passwordError }}</div>
        }
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Current password</label>
            <div class="position-relative">
              <input [type]="showCurrentPassword ? 'text' : 'password'" class="form-control pe-5" [(ngModel)]="currentPassword" />
              <button type="button" class="password-visibility-toggle" (click)="showCurrentPassword = !showCurrentPassword" [attr.aria-label]="showCurrentPassword ? 'Hide password' : 'Show password'" [attr.title]="showCurrentPassword ? 'Hide password' : 'Show password'">
                @if (showCurrentPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M13.359 11.238 15 12.879l-.707.707-2.002-2.002a8.74 8.74 0 0 1-4.29 1.153C3 12.737.7 8 .7 8a13.1 13.1 0 0 1 3.066-3.686L1.12 1.668l.707-.707 13.536 13.535-.707.707-1.297-1.297zM6.254 4.84A3 3 0 0 1 11.16 9.746l-.824-.824a2 2 0 0 0-2.512-2.512z"/>
                    <path d="M8 3.263c5 0 7.3 4.737 7.3 4.737a13.1 13.1 0 0 1-2.137 2.92l-.715-.715A12 12 0 0 0 14.161 8S12.147 4.263 8 4.263c-.847 0-1.612.156-2.297.39l-.786-.787A7.9 7.9 0 0 1 8 3.263"/>
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                  </svg>
                }
              </button>
            </div>
          </div>
          <div class="col-md-4">
            <label class="form-label">New password</label>
            <div class="position-relative">
              <input [type]="showNewPassword ? 'text' : 'password'" class="form-control pe-5" [(ngModel)]="newPassword" />
              <button type="button" class="password-visibility-toggle" (click)="showNewPassword = !showNewPassword" [attr.aria-label]="showNewPassword ? 'Hide password' : 'Show password'" [attr.title]="showNewPassword ? 'Hide password' : 'Show password'">
                @if (showNewPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M13.359 11.238 15 12.879l-.707.707-2.002-2.002a8.74 8.74 0 0 1-4.29 1.153C3 12.737.7 8 .7 8a13.1 13.1 0 0 1 3.066-3.686L1.12 1.668l.707-.707 13.536 13.535-.707.707-1.297-1.297zM6.254 4.84A3 3 0 0 1 11.16 9.746l-.824-.824a2 2 0 0 0-2.512-2.512z"/>
                    <path d="M8 3.263c5 0 7.3 4.737 7.3 4.737a13.1 13.1 0 0 1-2.137 2.92l-.715-.715A12 12 0 0 0 14.161 8S12.147 4.263 8 4.263c-.847 0-1.612.156-2.297.39l-.786-.787A7.9 7.9 0 0 1 8 3.263"/>
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                  </svg>
                }
              </button>
            </div>
          </div>
          <div class="col-md-4">
            <label class="form-label">Confirm new password</label>
            <div class="position-relative">
              <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control pe-5" [(ngModel)]="confirmPassword" />
              <button type="button" class="password-visibility-toggle" (click)="showConfirmPassword = !showConfirmPassword" [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'" [attr.title]="showConfirmPassword ? 'Hide password' : 'Show password'">
                @if (showConfirmPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M13.359 11.238 15 12.879l-.707.707-2.002-2.002a8.74 8.74 0 0 1-4.29 1.153C3 12.737.7 8 .7 8a13.1 13.1 0 0 1 3.066-3.686L1.12 1.668l.707-.707 13.536 13.535-.707.707-1.297-1.297zM6.254 4.84A3 3 0 0 1 11.16 9.746l-.824-.824a2 2 0 0 0-2.512-2.512z"/>
                    <path d="M8 3.263c5 0 7.3 4.737 7.3 4.737a13.1 13.1 0 0 1-2.137 2.92l-.715-.715A12 12 0 0 0 14.161 8S12.147 4.263 8 4.263c-.847 0-1.612.156-2.297.39l-.786-.787A7.9 7.9 0 0 1 8 3.263"/>
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                  </svg>
                }
              </button>
            </div>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-outline-primary" [disabled]="savingPassword" (click)="savePassword()">
            {{ savingPassword ? 'Updating...' : 'Update password' }}
          </button>
        </div>
      </div>
    </div>
  }
</div>
