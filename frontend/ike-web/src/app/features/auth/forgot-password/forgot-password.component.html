<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-4">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body auth-card-body">
            <h2 class="card-title mb-4">Forgot password</h2>
            @if (message) {
              <div class="alert alert-success" role="alert">{{ message }}</div>
            }
            @if (error) {
              <div class="alert alert-danger" role="alert">{{ error }}</div>
            }
            <form (ngSubmit)="submit()">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" [(ngModel)]="email" name="email" required email placeholder="e.g. name@company.com" />
              </div>
              <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                {{ loading ? 'Sending...' : 'Send reset link' }}
              </button>
            </form>
            <p class="mt-3 mb-0 text-center text-muted">
              <a routerLink="/login">Back to sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
