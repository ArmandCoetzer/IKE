<div class="container-fluid">
  <app-breadcrumb [items]="breadcrumbs" />
  <app-page-header [title]="'Edit setup — ' + jobCardNumber" backBehavior="emit" (back)="goBack()" />

  @if (loading) {
    <p>Loading...</p>
  } @else {
    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-body p-4">
        <p class="text-muted small mb-4">Update priority, due date, and description.</p>

        @if (error) {
          <div class="alert alert-danger">{{ error }}</div>
        }

        <form (ngSubmit)="save()">
          <div class="mb-3">
            <label class="form-label fw-medium">Priority (1=least, 5=most urgent)</label>
            <select class="form-select" [(ngModel)]="jobPriority" name="jobPriority" style="max-width: 8rem;">
              @for (p of [1,2,3,4,5]; track p) {
                <option [ngValue]="p">{{ p }}</option>
              }
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">Due date (optional)</label>
            <input type="date" class="form-control" [(ngModel)]="jobDueDate" name="jobDueDate" style="max-width: 12rem;" (click)="openDatePicker($event)" />
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">Job description</label>
            <textarea class="form-control" [(ngModel)]="jobDescription" name="jobDescription" rows="2" placeholder="What we're doing — e.g. installation, repair, inspection"></textarea>
          </div>
          <div class="border rounded p-3 mb-4 bg-light">
            <div class="form-check form-switch mb-1">
              <input type="checkbox" class="form-check-input" id="editPermitsRequired" [(ngModel)]="permitsRequired" name="permitsRequired" />
              <label class="form-check-label fw-medium" for="editPermitsRequired">Permits required for this job</label>
            </div>
            <p class="text-muted small mb-0">
              When off, permit requirements are skipped for this job. Turning it back on restores the normal permit workflow.
            </p>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="submitting || (partsRequired && plannedParts.length === 0)">
              {{ submitting ? 'Saving…' : 'Save' }}
            </button>
            <button type="button" class="btn btn-light border" (click)="goBack()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
