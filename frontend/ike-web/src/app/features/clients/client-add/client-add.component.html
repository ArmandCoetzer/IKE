<div class="container-fluid">
  <app-page-header title="Add client" backLink="/clients"></app-page-header>
  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-body p-4">
      @if (error) {
        <div class="alert alert-danger">{{ error }}</div>
      }
      <form (ngSubmit)="save()">
        <h2 class="h6 text-uppercase text-muted mb-3">Company</h2>
        <div class="mb-3">
          <label class="form-label">Company name</label>
          <input type="text" class="form-control" [(ngModel)]="companyName" name="companyName" required placeholder="e.g. Acme Ltd" />
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Contact name</label>
            <input type="text" class="form-control" [(ngModel)]="contactName" name="contactName" placeholder="e.g. John Smith" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" [(ngModel)]="phone" name="phone" placeholder="e.g. +27 11 123 4567" />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="e.g. contact&#64;company.com" />
        </div>

        <div class="d-flex align-items-center justify-content-between mb-3">
          <h2 class="h6 text-uppercase text-muted mb-0">Site</h2>
          <button type="button" class="btn btn-outline-primary btn-sm" (click)="addSiteRow()">Add site</button>
        </div>
        @for (row of siteRows; track $index) {
          <div class="row g-3 mb-3 align-items-end">
            <div class="col-md-5">
              <label class="form-label">Site name</label>
              <input type="text" class="form-control" [(ngModel)]="row.name" [name]="'siteName' + $index" placeholder="e.g. Main warehouse" />
            </div>
            <div class="col-md-5">
              <label class="form-label">Site address</label>
              <input type="text" class="form-control" [(ngModel)]="row.address" [name]="'siteAddress' + $index" placeholder="Street, city" />
            </div>
            <div class="col-md-2">
              @if (siteRows.length > 1) {
                <button type="button" class="btn btn-outline-secondary btn-sm w-100" (click)="removeSiteRow($index)">Remove</button>
              }
            </div>
          </div>
        }
        <p class="text-muted small mb-4">At least one site with a name is required. Rows with no site name are ignored.</p>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="submitting">Save</button>
          <a routerLink="/clients" class="btn btn-light border">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
