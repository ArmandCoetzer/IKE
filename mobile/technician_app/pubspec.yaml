name: tradion_technician
description: Tradion Technician mobile app for field workers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  geolocator: ^11.0.0
  url_launcher: ^6.2.5
  intl: ^0.19.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  signature: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

dependency_overrides:
  geolocator_android: 4.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/tradion-icon.png
  adaptive_icon_background: "#2C2E33"
  adaptive_icon_foreground: assets/logo/tradion-icon.png
